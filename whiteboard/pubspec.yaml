name: eduhub_whiteboard
description: EduHub Digital Whiteboard - Interactive Teaching Tool

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Canvas & Drawing
  flutter_drawing_board: ^0.7.0
  perfect_freehand: ^2.3.1
  
  # Network
  dio: ^5.4.0
  retrofit: ^4.0.3
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  pdfx: ^2.4.0
  
  # Math & Science
  math_expressions: ^2.4.0
  flutter_math_fork: ^0.7.2
  
  # AI Integration
  google_generative_ai: ^0.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
